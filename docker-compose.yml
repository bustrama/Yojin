services:
  # ── Backend: API + Channels (Slack, etc.) ───────────────────
  yojin:
    build: .
    image: yojin:local
    container_name: yojin
    restart: unless-stopped
    ports:
      - '${YOJIN_PORT:-3000}:3000'
    volumes:
      - yojin_data:/home/node/.yojin
      - yojin_vault:/home/node/.yojin-vault
    environment:
      # ── AI Provider (required — at least one) ──
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # ── Slack Channel (optional) ──
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      # ── Server ──
      - YOJIN_HOST=0.0.0.0
      - YOJIN_PORT=3000
      - YOJIN_CORS_ORIGIN=${YOJIN_CORS_ORIGIN:-http://localhost:8080}
      - NODE_ENV=production
      - YOJIN_LOG_LEVEL=${YOJIN_LOG_LEVEL:-info}
      # ── Vault ──
      - YOJIN_VAULT_PASSPHRASE=${YOJIN_VAULT_PASSPHRASE:-}
      # ── Timezone ──
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Web UI: Nginx serving React app ─────────────────────────
  web:
    image: nginx:alpine
    container_name: yojin-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - web_dist:/usr/share/nginx/html:ro
    depends_on:
      yojin:
        condition: service_healthy
      web-init:
        condition: service_completed_successfully

  # ── Init: Copy built web assets to shared volume ────────────
  web-init:
    image: yojin:local
    container_name: yojin-web-init
    user: root
    entrypoint: ['sh', '-c', 'cp -r /app/apps/web/dist/* /web-dist/']
    volumes:
      - web_dist:/web-dist
    depends_on:
      yojin:
        condition: service_started

volumes:
  yojin_data:
    name: yojin_data
  yojin_vault:
    name: yojin_vault
  web_dist:
    name: yojin_web_dist
