version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    groups:
      eslint:
        patterns:
          - '@eslint/*'
          - eslint
          - typescript-eslint
      slack:
        patterns:
          - '@slack/*'
      testing:
        patterns:
          - vitest
      typescript:
        patterns:
          - typescript
          - '@types/node'
          - tsx

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
