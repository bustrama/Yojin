name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create/update (e.g. desktop-v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust-targets: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
            bundle-node-target: ''
          - platform: macos-14
            rust-targets: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin
            bundle-node-target: darwin-x64
          - platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ''
            bundle-node-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build backend + web dashboard
        run: pnpm --filter @yojin/desktop deps:build

      - name: Bundle Node runtime
        shell: bash
        env:
          CROSS_TARGET: ${{ matrix.bundle-node-target }}
        run: |
          if [ -n "$CROSS_TARGET" ]; then
            # Cross-bundle: download the target-arch Node binary and rename
            # to bare `node` so sidecar.rs resolves it at runtime.
            node apps/desktop/scripts/bundle-node.mjs --target="$CROSS_TARGET"
            mv "apps/desktop/src-tauri/sidecar/node-$CROSS_TARGET" \
               "apps/desktop/src-tauri/sidecar/node"
            chmod +x apps/desktop/src-tauri/sidecar/node
          else
            pnpm --filter @yojin/desktop bundle:node
          fi

      - name: Stage backend bundle (dist + web + prod deps)
        run: pnpm --filter @yojin/desktop bundle:app

      - name: Pre-sign sidecar binaries (macOS only)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN=yojin-sidecar.keychain
          KEYCHAIN_PWD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          EXISTING=$(security list-keychains -d user | sed -e 's/^[[:space:]]*//;s/"//g' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN" $EXISTING
          CERT_FILE=$(mktemp -t cert).p12
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_FILE"
          security import "$CERT_FILE" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" > /dev/null
          rm -f "$CERT_FILE"
          SIDECAR_DIR=apps/desktop/src-tauri/sidecar
          if [ ! -d "$SIDECAR_DIR" ]; then
            echo "Sidecar dir not found: $SIDECAR_DIR" >&2
            exit 1
          fi
          while IFS= read -r -d '' f; do
            echo "Signing $f"
            codesign --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options runtime --force "$f"
          done < <(find "$SIDECAR_DIR" -type f \( -name '*.dylib' -o -name '*.so' -o -name '*.node' \) -print0)
          for bin in "$SIDECAR_DIR"/node "$SIDECAR_DIR"/node-*; do
            if [ -f "$bin" ]; then
              echo "Signing $bin"
              codesign --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options runtime --force "$bin"
            fi
          done

      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri bundle + upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: 'Yojin Desktop ${{ steps.tag.outputs.value }}'
          releaseBody: |
            **macOS**: signed + notarized with Apple Developer ID. Double-click to install.
            **Windows**: unsigned — SmartScreen popup → "More info" → "Run anyway". Windows OV/EV cert is on the roadmap.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri-args }}
